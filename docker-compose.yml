services:
  db:
    image: postgres:15-alpine
    container_name: glambeauty_db
    environment:
      POSTGRES_DB: glambeauty
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glambeauty_backend
    environment:
      - DB_URL=jdbc:postgresql://db:5432/glambeauty
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      # Adjust these as needed for your production environment
      - JWT_SECRET=change-me-secret-with-a-very-long-secret-key-that-is-at-least-256-bits-long-for-jwt-security
      - JWT_EXPIRATION_MINUTES=1440
    ports:
      - "8081:8081"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: glambeauty_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
